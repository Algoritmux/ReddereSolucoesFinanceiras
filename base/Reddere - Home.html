:10.5px;letter-spacing:1.5px;font-weight:700;color:#B99673\">{{ featured.kicker }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:rgba(235,230,230,.5);margin-top:3px\">{{ featured.category }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Kanit',sans-serif;font-weight:600;font-size:22px;line-height:1.2;color:#EBE6E6\">{{ featured.title }}<\u002Fh3>\n            <p style=\"font-size:14px;line-height:1.6;color:rgba(235,230,230,.68);margin-top:10px\">{{ featured.desc }}<\u002Fp>\n            <a href=\"Solucoes.dc.html\" style=\"display:inline-flex;align-items:center;gap:7px;margin-top:18px;font-weight:600;color:#B99673;font-size:13.5px\" style-hover=\"color:#cda884\">Conhecer solução →<\u002Fa>\n          <\u002Fdiv>\n\n          <!-- indicadores de todas as soluções -->\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:20px\">\n            <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"8\">\n              <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.short }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ NÚMEROS ============ -->\n  <section style=\"background:#0F5564;padding:0;position:relative\">\n    <div data-cols4=\"\" style=\"max-width:1240px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"padding:44px 32px;border-right:1px solid rgba(235,230,230,.1);text-align:center\">\n          <div style=\"font-family:'Kanit',sans-serif;font-weight:700;font-size:clamp(30px,3.4vw,44px);color:#B99673;line-height:1\">{{ s.value }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:rgba(235,230,230,.82);margin-top:8px;letter-spacing:.3px\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdi 50,115,.25);border-radius:3px\">{{ c.sigla }}<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"max-width:1240px;margin:26px auto 0\">\n      <p style=\"font-size:11.5px;line-height:1.7;color:rgba(235,230,230,.42);max-width:920px\">A Reddere Investimentos atua com soluções financeiras e de investimentos. Investimentos envolvem riscos e podem resultar em perdas patrimoniais. Rentabilidade passada não representa garantia de rentabilidade futura. As projeções do simulador são meramente ilustrativas. Em conformidade com as normas da CVM, ANBIMA e ANCORD aplicáveis.<\u002Fp>\n      <div style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-top:22px;font-size:12px;color:rgba(235,230,230,.42)\">\n        <span>© 2026 Reddere Investimentos. Vencer com Lealdade.<\u002Fspan>\n        <div style=\"display:flex;gap:22px\">\n          <a href=\"#\" style-hover=\"color:#B99673\">Política de Privacidade<\u002Fa>\n          <a href=\"#\" style-hover=\"color:#B99673\">Termos de Uso<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    menuOpen: false,\n    scrolled: false,\n    featuredIndex: 0,\n    valorInicial: 100000,\n    aporteMensal: 2000,\n    prazoAnos: 10,\n    taxa: 10,\n  };\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const s = window.scrollY > 30;\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._feat = setInterval(() => {\n      this.setState(s => ({ featuredIndex: s.featuredIndex + 1 }));\n    }, 3200);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    clearInterval(this._feat);\n  }\n\n  _solucoes() {\n    try {\n      const list = window.ReddereStore.getSolucoesAtivas();\n      if (list && list.length) return list;\n    } catch (e) {}\n    return (window.ReddereStore && window.ReddereStore.DEFAULT_SOLUCOES) || [];\n  }\n\n  fmt(v) {\n    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 });\n  }\n\n  _short(t) {\n    return t.length > 26 ? t.slice(0, 24).trim() + '…' : t;\n  }\n\n  renderVals() {\n    const { valorInicial, aporteMensal, prazoAnos, taxa, scrolled, menuOpen, featuredIndex } = this.state;\n    const sols = this._solucoes();\n    const len = sols.length || 1;\n    const fi = featuredIndex % len;\n    const featured = sols[fi] || { id: 'x', title: '', desc: '', kicker: '', category: '', glyph: 'circle(50%)' };\n\n    const quotes = [\n      { label: 'IBOVESPA', value: '128.450', change: '▲ 0,84%' },\n      { label: 'USD/BRL', value: 'R$ 5,42', change: '▼ 0,21%' },\n      { label: 'EUR/BRL', value: 'R$ 5,88', change: '▲ 0,12%' },\n      { label: 'CDI', value: '10,40% a.a.', change: '▬ 0,00%' },\n      { label: 'IPCA 12m', value: '4,12%', change: '▲ 0,08%' },\n      { label: 'BTC/USD', value: 'US$ 67.200', change: '▲ 1,30%' },\n    ];\n\n    const n = prazoAnos * 12;\n    const i = Math.pow(1 + taxa / 100, 1 / 12) - 1;\n    const fvInicial = valorInicial * Math.pow(1 + i, n);\n    const fvAportes = i > 0 ? aporteMensal * ((Math.pow(1 + i, n) - 1) / i) : aporteMensal * n;\n    const total = fvInicial + fvAportes;\n    const investido = valorInicial + aporteMensal * n;\n    const rendimento = total - investido;\n\n    const chips = sols.map((s, idx) => ({\n      short: this._short(s.title),\n      onClick: () => this.setState({ featuredIndex: idx }),\n      style: {\n        background: idx === fi ? '#B99673' : 'rgba(185,150,115,.1)',\n        color: idx === fi ? '#0F3241' : 'rgba(235,230,230,.78)',\n        border: '1px solid ' + (idx === fi ? '#B99673' : 'rgba(185,150,115,.25)'),\n        fontSize: '11.5px', fontWeight: 600, padding: '7px 11px', borderRadius: '30px',\n        cursor: 'pointer', transition: 'all .2s', lineHeight: 1,\n      },\n    }));\n\n    return {\n      menuOpen,\n      quotesLoop: [...quotes, ...quotes],\n      headerStyle: {\n        position: 'fixed', top: '36px', left: 0, right: 0, zIndex: 100,\n        background: scrolled ? 'rgba(10,38,50,.92)' : 'transparent',\n        backdropFilter: scrolled ? 'blur(12px)' : 'none',\n        borderBottom: scrolled ? '1px solid rgba(185,150,115,.18)' : '1px solid transparent',\n        transition: 'all .3s ease',\n      },\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n\n      // hero showcase\n      featured,\n      featuredCounter: String(fi + 1).padStart(2, '0') + ' / ' + String(len).padStart(2, '0'),\n      chips,\n      marqueeLoop: [...sols, ...sols].map(s => ({ title: s.title, glyph: s.glyph })),\n      heroStats: [\n        { value: 'R$ 2,8 bi', label: 'Sob gestão' },\n        { value: '+1.200', label: 'Famílias atendidas' },\n        { value: '18 anos', label: 'De mercado' },\n      ],\n\n      // simulador\n      valorInicial, aporteMensal, prazoAnos, taxa,\n      valorInicialFmt: this.fmt(valorInicial),\n      aporteMensalFmt: this.fmt(aporteMensal),\n      totalFmt: this.fmt(total),\n      investidoFmt: this.fmt(investido),\n      rendimentoFmt: this.fmt(rendimento),\n      onValorInicial: e => this.setState({ valorInicial: +e.target.value }),\n      onAporteMensal: e => this.setState({ aporteMensal: +e.target.value }),\n      onPrazo: e => this.setState({ prazoAnos: +e.target.value }),\n      onTaxa: e => this.setState({ taxa: +e.target.value }),\n\n      stats: [\n        { value: 'R$ 2,8 bi', label: 'Sob gestão' },\n        { value: '+1.200', label: 'Famílias atendidas' },\n        { value: '18 anos', label: 'De mercado' },\n        { value: '32', label: 'Especialistas certificados' },\n      ],\n      solutions: sols.slice(0, 6),\n      certs: [\n        { sigla: 'CVM', nome: 'Comissão de Valores Mobiliários' },\n        { sigla: 'ANBIMA', nome: 'Código de melhores práticas' },\n        { sigla: 'ANCORD', nome: 'Agentes autônomos' },\n        { sigla: 'CFP®', nome: 'Certified Financial Planner' },\n        { sigla: 'CEA', nome: 'Especialista em investimentos' },\n        { sigla: 'CGA', nome: 'Gestor de ativos' },\n      ],\n      articles: [\n        { tag: 'Macroeconomia', date: 'Jun 2026', title: 'Juros em transição: como posicionar a carteira', summary: 'O que a curva de juros sinaliza para a alocação nos próximos trimestres.' },\n        { tag: 'Proteção', date: 'Mai 2026', title: 'Seguro de vida como ferramenta sucessória', summary: 'Como a proteção garante liquidez imediata e preserva o patrimônio da família.' },\n        { tag: 'Planejamento', date: 'Abr 2026', title: 'Sucessão: começar cedo custa menos', summary: 'Os erros mais comuns na transmissão de patrimônio e como evitá-los.' },\n      ],\n      testimonials: [\n        { quote: 'Pela primeira vez senti que minha carteira tinha uma estratégia de verdade, não só produtos empurrados.', name: 'Ricardo M.', role: 'Empresário', initials: 'RM' },\n        { quote: 'Transparência e disciplina. Sei exatamente onde estou e para onde vamos com o patrimônio da família.', name: 'Helena V.', role: 'Médica', initials: 'HV' },\n        { quote: 'O acompanhamento próximo faz toda a diferença. É uma relação de confiança real.', name: 'André P.', role: 'Executivo', initials: 'AP' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
